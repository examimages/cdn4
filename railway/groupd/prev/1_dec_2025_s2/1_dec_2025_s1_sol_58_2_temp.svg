<svg width="190" height="182" xmlns="http://www.w3.org/2000/svg">
  <svg viewBox="0 0 800 850" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Professional arrowhead definition -->
      <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
      </marker>
    </defs>

    <!-- Main Container Shape -->
    <circle cx="400" cy="425" r="160" fill="none" stroke="#000000" stroke-width="2.5" />

    <!-- Connector Lines and Arrows -->
    <g stroke="#000000" stroke-width="2.5" marker-end="url(#arrow)" fill="none" stroke-linecap="round">
      <!-- Arrow A (Top-Left) -->
      <line x1="220" y1="245" x2="310" y2="335" />
      <!-- Arrow D (Top) -->
      <line x1="400" y1="140" x2="400" y2="280" />
      <!-- Middle-Left Arrow (No Label) -->
      <line x1="120" y1="480" x2="270" y2="455" />
      <!-- Bottom-Left Arrow (No Label) -->
      <line x1="210" y1="690" x2="320" y2="560" />
      <!-- Arrow C (Bottom-Center) -->
      <line x1="460" y1="740" x2="435" y2="600" />
      <!-- Arrow B (Bottom-Right) -->
      <line x1="680" y1="720" x2="545" y2="555" />
      <!-- Middle-Right Arrow (No Label) -->
      <line x1="710" y1="370" x2="565" y2="405" />
    </g>

    <!-- Labels -->
    <g font-family="Arial, sans-serif" font-size="30px" font-weight="bold" fill="#000000">
      <!-- A -->
      <text x="180" y="210" text-anchor="middle">A</text>
      <!-- D -->
      <text x="400" y="110" text-anchor="middle">D</text>
      <!-- C -->
      <text x="460" y="795" text-anchor="middle">C</text>
      <!-- B -->
      <text x="730" y="775" text-anchor="middle">B</text>
    </g>
  </svg>
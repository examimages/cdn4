<svg width="190" height="182" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
  </defs>

  <!-- Central Circle -->
  <circle cx="400" cy="400" r="180" fill="none" stroke="black" stroke-width="2" />

  <!-- Arrows pointing towards the center -->
  
  <!-- Arrow D (Top) -->
  <line x1="400" y1="100" x2="400" y2="260" stroke="black" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="400" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="30">D</text>

  <!-- Arrow A (Top-Left) -->
  <line x1="188" y1="188" x2="300" y2="300" stroke="black" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="160" y="160" text-anchor="end" font-family="Arial, sans-serif" font-size="30">A</text>

  <!-- Arrow (Left) -->
  <line x1="100" y1="400" x2="260" y2="400" stroke="black" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Arrow (Bottom-Left) -->
  <line x1="188" y1="612" x2="300" y2="500" stroke="black" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Arrow C (Bottom) -->
  <line x1="400" y1="700" x2="400" y2="540" stroke="black" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="400" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="30">C</text>

  <!-- Arrow B (Bottom-Right) -->
  <line x1="612" y1="612" x2="500" y2="500" stroke="black" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="640" y="640" text-anchor="start" font-family="Arial, sans-serif" font-size="30">B</text>

  <!-- Arrow (Right) -->
  <line x1="700" y1="400" x2="540" y2="400" stroke="black" stroke-width="2" marker-end="url(#arrowhead)" />

</svg>